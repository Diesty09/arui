name: arui_digital
description: "A new Flutter project for ARUI Digital."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management & Routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0

  # UI / Utils
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  flutter_svg: ^2.0.10
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#7C3AED"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
